<!DOCTYPE html>
<html>
<head>
  <title>BizLex Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:20px; }
    .card { background:#1e293b; padding:20px; border-radius:12px; margin:20px auto; max-width:400px; }
    button { padding:10px 15px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
    .correct { background:green; }
    .wrong { background:red; }
  </style>
</head>

<body>

<h2>📘 BizLex Pro</h2>
<p id="stats"></p>

<div class="card">
  <h1 id="word"></h1>
  <p id="meaning"></p>
  <p><i id="example"></i></p>
</div>

<div id="quiz"></div>

<button onclick="markLearned()">✔ Mark Learned (+5 XP)</button>

<script>

// ===================== DATA =====================
const WORDS = [
  {
    word:"Leverage",
    meaning:"Use something to maximum advantage",
    example:"We leveraged data insights to improve margins.",
    synonyms:["utilize","capitalize","exploit"]
  },
  {
    word:"Scalability",
    meaning:"Ability to grow without proportional cost increase",
    example:"The SaaS model ensures scalability.",
    synonyms:["expandability","growth"]
  },
  {
    word:"Synergy",
    meaning:"Combined effect greater than individual parts",
    example:"The merger created strong operational synergy.",
    synonyms:["collaboration","integration"]
  }
];

// ===================== DAILY WORD =====================
const startDate = new Date("2026-01-01");
const today = new Date();
const diffDays = Math.floor((today - startDate)/(1000*60*60*24));
const index = diffDays % WORDS.length;
const currentWord = WORDS[index];

// ===================== UI =====================
document.getElementById("word").innerText = currentWord.word;
document.getElementById("meaning").innerText = currentWord.meaning;
document.getElementById("example").innerText = currentWord.example;

// ===================== XP SYSTEM =====================
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastVisit = localStorage.getItem("lastVisit");

function updateStats(){
  document.getElementById("stats").innerText =
    `XP: ${xp} | Level: ${Math.floor(xp/50)+1} | 🔥 ${streak}`;
}
updateStats();

// ===================== STREAK =====================
function updateStreak(){
  let todayStr = new Date().toDateString();
  let yesterday = new Date();
  yesterday.setDate(yesterday.getDate()-1);

  if(lastVisit === todayStr) return;

  if(lastVisit === yesterday.toDateString()){
    streak++;
  } else {
    streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastVisit", todayStr);
}
updateStreak();

// ===================== QUIZ =====================
function loadQuiz(){
  let options = shuffle([
    currentWord.meaning,
    "Random wrong meaning",
    "Another wrong meaning",
    "Incorrect option"
  ]);

  let html = "<h3>What does this word mean?</h3>";
  options.forEach(opt=>{
    html += `<button onclick="checkAnswer('${opt}')">${opt}</button><br>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(ans){
  if(ans === currentWord.meaning){
    xp += 10;
    alert("Correct! +10 XP");
  } else {
    alert("Wrong!");
  }
  localStorage.setItem("xp", xp);
  updateStats();
}

// ===================== MARK LEARNED =====================
function markLearned(){
  xp += 5;
  localStorage.setItem("xp", xp);
  alert("Saved! +5 XP");
  updateStats();
}

// ===================== HELPERS =====================
function shuffle(arr){
  return arr.sort(()=>0.5-Math.random());
}

loadQuiz();

</script>

</body>
</html>
